<div class="media-section">
  {% for item in site.data.media %}
  <div class="media-item card mt-3">
    <div class="row no-gutters">
      {% if item.source == "youtube" %}
      <div class="col-md-6">
        <div class="embed-responsive embed-responsive-16by9">
          <iframe class="embed-responsive-item rounded"
            src="https://www.youtube.com/embed/{{ item.id }}"
            allowfullscreen>
          </iframe>
        </div>
      </div>
      <div class="col-md-6 d-flex align-items-center">
        <div class="card-body">
          <span class="badge badge-pill badge-primary mb-2">{{ item.type }}</span>
          <h5 class="card-title font-weight-bold">{{ item.title }}</h5>
          <p class="card-text">{{ item.description }}</p>
          <a href="https://www.youtube.com/watch?v={{ item.id }}" target="_blank" class="btn btn-sm btn-outline-primary">Watch on YouTube</a>
        </div>
      </div>
      {% endif %}
    </div>
  </div>
  {% endfor %}
</div>
